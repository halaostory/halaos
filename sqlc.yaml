version: "2"
sql:
  - schema: "db/migrations"
    queries: "db/query"
    engine: "postgresql"
    gen:
      go:
        package: "store"
        out: "internal/store"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "date"
            go_type: "time.Time"
          - db_type: "numeric"
            go_type: "string"
          - db_type: "text[]"
            go_type:
              type: "[]string"
              import: ""
          - db_type: "bigint[]"
            go_type:
              type: "[]int64"
              import: ""
          - db_type: "jsonb"
            go_type:
              type: "RawMessage"
              import: "encoding/json"
          - db_type: "inet"
            go_type: "string"
          - db_type: "uuid"
            go_type:
              type: "UUID"
              import: "github.com/google/uuid"
