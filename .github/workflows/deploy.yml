name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build Go binaries
        run: make build-linux

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Prepare deploy bundle
        run: |
          mkdir -p deploy/bin deploy/db deploy/frontend
          cp bin/api bin/worker bin/migrate deploy/bin/
          cp -r db/migrations deploy/db/
          cp -r frontend/dist deploy/frontend/
          cp frontend/nginx.conf deploy/frontend/
          cp frontend/Dockerfile.prebuilt deploy/frontend/
          cp Dockerfile.prebuilt deploy/
          cp docker-compose.deploy.yml deploy/

      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy/*"
          target: "~/aigonhr-deploy"
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/aigonhr

            # Write env file
            cat > .env << 'ENVEOF'
            ${{ secrets.ENV_FILE }}
            ENVEOF
            sed -i 's/^            //' .env

            # Copy built artifacts
            cp -r ~/aigonhr-deploy/bin ./
            cp -r ~/aigonhr-deploy/db ./
            cp ~/aigonhr-deploy/Dockerfile.prebuilt ./
            cp ~/aigonhr-deploy/docker-compose.deploy.yml ./

            # Copy frontend build
            mkdir -p frontend
            cp -r ~/aigonhr-deploy/frontend/dist frontend/
            cp ~/aigonhr-deploy/frontend/nginx.conf frontend/
            cp ~/aigonhr-deploy/frontend/Dockerfile.prebuilt frontend/

            # Build and deploy (prebuilt = fast, just copies binaries)
            sudo docker compose -f docker-compose.deploy.yml up -d --build --remove-orphans

            # Cleanup
            rm -rf ~/aigonhr-deploy
            sudo docker image prune -f

            echo "Deployed successfully!"
