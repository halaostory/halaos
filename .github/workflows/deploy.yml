name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build Linux binaries
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bin/api ./cmd/api
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bin/worker ./cmd/worker
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bin/migrate ./cmd/migrate

      - name: Upload binaries and config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "bin/api,bin/worker,bin/migrate,db/migrations/,Dockerfile.prebuilt,docker-compose.prod.yml,frontend/"
          target: "~/aigonhr/"
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/aigonhr

            # Write env file (preserve if exists, create if not)
            if [ ! -f .env ]; then
              cat > .env << 'ENVEOF'
            ${{ secrets.ENV_FILE }}
            ENVEOF
              sed -i 's/^            //' .env
            fi

            # Build and deploy with prebuilt binaries
            sudo docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            # Wait for services to start
            sleep 10

            # Show status
            sudo docker compose -f docker-compose.prod.yml ps

            # Cleanup old images
            sudo docker image prune -f

            echo "Deploy complete!"
